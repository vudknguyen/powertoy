  await go('filehash');
  const blob = new Blob([new TextEncoder().encode('hello')], { type:'text/plain' });
  const dt = new DataTransfer(); dt.items.add(new File([blob], 'h.txt', { type:'text/plain' }));
  const f = $('#fh-file'); Object.defineProperty(f, 'files', { value: dt.files, configurable: true }); f.dispatchEvent(new Event('change'));
  await wait(400);
  eq(txt('#fh-md5'), '5d41402abc4b2a76b9719d911017c592');
  eq(txt('#fh-sha256'), '2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824');
  set('#fh-exp', '2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824'); inc(txt('#fh-vres'), 'matches SHA-256');
});

t('favicon generator', async () => {
  await go('favicon');

});

/* ---------- run ---------- */
async function run(){
  await new Promise(r => { if (D() && D().querySelector('#nav button')) r(); else frame.onload = () => setTimeout(r, 300); });
  try { W().localStorage.clear(); } catch {}
  const rows = [], fails = [];
  let pass = 0;
  for (const test of T){
    try { await test.fn(); rows.push(`<tr class="pass"><td>✓</td><td>${test.name}</td><td></td></tr>`); pass++; }
    catch (e){ rows.push(`<tr class="fail"><td>✗</td><td>${test.name}</td><td>${(e.message||e).replace(/</g,'&lt;')}</td></tr>`); fails.push(test.name + ': ' + (e.message||e)); }
  }
  document.getElementById('results').innerHTML = rows.join('');
  const total = T.length;
  const sum = `<span class="${fails.length?'fail':'pass'}">${pass}/${total} passed${fails.length?` · ${fails.length} FAILED`:' · ALL GREEN'}</span>`;
  document.getElementById('summary').innerHTML = sum;
  window.__testResults = { pass, total, fails };
}
run();
</script>
