/* ── json → types ──────────────────────────────────────────── */
tool({
  id:'j2t', name:'JSON → types', group:'Text',
  blurb:'Paste a JSON sample, get the type definitions: TypeScript interfaces, Go structs or JSON Schema. Arrays are merged across items, so fields missing in some objects come out optional.',
  html: `
    <div class="row">
      <div class="seg" id="jt-lang">
        <button class="on" data-l="ts">TypeScript</button>
        <button data-l="go">Go</button>
        <button data-l="schema">JSON Schema</button>
      </div>
      <label class="check">root name <input type="text" id="jt-name" value="Root" style="width:7rem"></label>
    </div>
    <label class="lbl">JSON sample</label>
    <textarea id="jt-in" spellcheck="false" style="min-height:140px">{
  "id": 7,
  "name": "Ada",
  "tags": ["pioneer", "math"],
  "address": { "city": "London", "zip": null },
  "active": true
}</textarea>
    <div class="err" id="jt-err"></div>
    <label class="lbl">Output ${cpyBtn('#jt-out')}</label>
    <textarea id="jt-out" readonly style="min-height:180px"></textarea>
    ${shPanel('j2t', [
      {why:'quicktype does this for every language (npm i -g quicktype)', cmd:`quicktype --lang ts --src data.json --top-level Root`},
    ])}`,
  wire(){
    const inp = $('#jt-in'), out = $('#jt-out'), err = $('#jt-err');
    let lang = 'ts';
    const shape = v => {
      if (v === null) return { kind:'null' };
      if (Array.isArray(v)) return { kind:'array', item: v.map(shape).reduce(merge, { kind:'unknown' }) };
      const t = typeof v;
      if (t === 'object'){
        const fields = {};
        for (const k of Object.keys(v)) fields[k] = { shape: shape(v[k]), optional: false };
        return { kind:'object', fields };
      }
      if (t === 'number') return { kind: Number.isInteger(v) ? 'int' : 'float' };
      return { kind: t };
    };
    function merge(a, b){
      if (a.kind === 'unknown') return b;
      if (b.kind === 'unknown') return a;
      if (a.kind === 'null') return { ...b, nullable: true };
      if (b.kind === 'null') return { ...a, nullable: true };
      const nullable = a.nullable || b.nullable;
      if (a.kind === b.kind){
        if (a.kind === 'array') return { kind:'array', item: merge(a.item, b.item), nullable };
        if (a.kind === 'object'){
          const fields = {};
          for (const k of new Set([...Object.keys(a.fields), ...Object.keys(b.fields)])){
            const fa = a.fields[k], fb = b.fields[k];
            fields[k] = fa && fb
              ? { shape: merge(fa.shape, fb.shape), optional: fa.optional || fb.optional }
              : { shape: (fa || fb).shape, optional: true };
          }
          return { kind:'object', fields, nullable };
        }
        return { ...a, nullable };
      }
      if ((a.kind === 'int' && b.kind === 'float') || (a.kind === 'float' && b.kind === 'int'))
        return { kind:'float', nullable };
      return { kind:'mixed', nullable };
    }
    const ident = (s, used) => {
      let n = s.replace(/[^A-Za-z0-9]+(.)?/g, (_, c) => c ? c.toUpperCase() : '').replace(/^\d/, '_$&');
      n = n.charAt(0).toUpperCase() + n.slice(1) || 'Field';
      let cand = n, i = 2;
      while (used.has(cand)) cand = n + i++;
      used.add(cand);
      return cand;
    };
    const genTS = (root, rootName) => {
      const defs = [], used = new Set();
      const tsType = (s, hint) => {
        let t;
        if (s.kind === 'object'){
          const name = ident(hint, used);
          const lines = Object.entries(s.fields).map(([k, f]) => {
            const key = /^[A-Za-z_$][\w$]*$/.test(k) ? k : JSON.stringify(k);
            return `  ${key}${f.optional ? '?' : ''}: ${tsType(f.shape, k)};`;
          });
          defs.push(`export interface ${name} {\n${lines.join('\n')}\n}`);
          t = name;
        }
        else if (s.kind === 'array'){
          const it = tsType(s.item, hint.replace(/s$/,'') || 'Item');
          t = it.includes(' ') ? `(${it})[]` : `${it}[]`;
        }
        else t = { int:'number', float:'number', string:'string', boolean:'boolean', mixed:'unknown', unknown:'unknown', null:'null' }[s.kind];
        return s.nullable ? `${t} | null` : t;
      };
      if (root.kind !== 'object') used.add(rootName);   // reserve for the alias
      const top = tsType(root, root.kind === 'object' ? rootName : rootName + 'Item');
      if (root.kind !== 'object') defs.push(`export type ${rootName} = ${top};`);
      return defs.reverse().join('\n\n');
    };
    const genGo = (root, rootName) => {
      const defs = [], used = new Set();
      const goType = (s, hint) => {
        let t;
        if (s.kind === 'object'){
          const name = ident(hint, used);
          const lines = Object.entries(s.fields).map(([k, f]) => {
            const fname = ident(k, new Set());
            return `\t${fname} ${f.nullable ? '*' : ''}${goType(f.shape, k)} \`json:"${k}${f.optional ? ',omitempty' : ''}"\``;
          });
          defs.push(`type ${name} struct {\n${lines.join('\n')}\n}`);
          t = name;
        }
        else if (s.kind === 'array') t = '[]' + goType(s.item, hint.replace(/s$/,'') || 'Item');
        else t = { int:'int64', float:'float64', string:'string', boolean:'bool', mixed:'any', unknown:'any', null:'any' }[s.kind];
        return t;
      };
      if (root.kind !== 'object') used.add(rootName);   // reserve for the alias
      const top = goType(root, root.kind === 'object' ? rootName : rootName + 'Item');
      if (root.kind !== 'object') defs.push(`type ${rootName} = ${top}`);
      return defs.reverse().join('\n\n');
    };
    const genSchema = s => {
      if (s.kind === 'object'){
        const props = {}, req = [];
        for (const [k, f] of Object.entries(s.fields)){
          props[k] = genSchema(f.shape);
          if (!f.optional) req.push(k);
        }
        const o = { type: s.nullable ? ['object','null'] : 'object', properties: props };
        if (req.length) o.required = req;
        return o;
      }
      if (s.kind === 'array') return { type: s.nullable ? ['array','null'] : 'array', items: genSchema(s.item) };
      if (s.kind === 'mixed' || s.kind === 'unknown') return {};
      const t = { int:'integer', float:'number', string:'string', boolean:'boolean', null:'null' }[s.kind];
      return { type: s.nullable ? [t,'null'] : t };
    };
    const run = () => {
      err.textContent = ''; out.value = '';
      const v = inp.value.trim(); if (!v) return;
      let data;
      try { data = JSON.parse(v); } catch (e){ err.textContent = 'Invalid JSON: ' + e.message; return; }
      const root = shape(data);
      const name = $('#jt-name').value.trim() || 'Root';
      try {
        if (lang === 'ts') out.value = genTS(root, name);
        else if (lang === 'go') out.value = genGo(root, name);
        else out.value = JSON.stringify({ $schema:'https://json-schema.org/draft/2020-12/schema', title:name, ...genSchema(root) }, null, 2);
      } catch (e){ err.textContent = 'Generation failed: ' + e.message; }
    };
    inp.addEventListener('input', run);
    $('#jt-name').addEventListener('input', run);
    $$('#jt-lang button').forEach(b => b.addEventListener('click', () => {
      $$('#jt-lang button').forEach(x => x.classList.remove('on')); b.classList.add('on'); lang = b.dataset.l; run();
    }));
    run();
  }
});

/* ── curl converter ────────────────────────────────────────── */
tool({
  id:'curl', name:'curl convert', group:'Ops',
  blurb:'Paste a curl command — straight from DevTools or API docs — and get the same request as fetch() and Python requests code.',
  html: `
    <label class="lbl">curl command</label>
    <textarea id="cu-in" spellcheck="false" style="min-height:110px">curl -X POST 'https://api.example.com/v1/items' \\
  -H 'Content-Type: application/json' \\
  -H 'Authorization: Bearer TOKEN' \\
  -d '{"name":"test","count":3}'</textarea>
    <div class="err" id="cu-err"></div>
    <label class="lbl">fetch ${cpyBtn('#cu-fetch')}</label>
    <textarea id="cu-fetch" readonly style="min-height:160px"></textarea>
    <label class="lbl">Python requests ${cpyBtn('#cu-py')}</label>
    <textarea id="cu-py" readonly style="min-height:140px"></textarea>
    ${shPanel('curl', [
      {why:'see exactly what curl sends', cmd:`curl -v https://api.example.com 2>&1 | grep '^[<>]'`},
      {why:'timing breakdown', cmd:`curl -s -o /dev/null -w 'dns %{time_namelookup}s · connect %{time_connect}s · total %{time_total}s\\n' https://example.com`},
    ])}
    <p class="note">Handles -X, -H, -d/--data*, --json, -u, -F, -b/--cookie, -A, -e, -k and -L. Anything unrecognized is ignored rather than guessed at.</p>`,
  wire(){
    const inp = $('#cu-in'), err = $('#cu-err');
    const tokens = s => {
      s = s.replace(/\\\r?\n/g, ' ');
      const out = []; let cur = '', q = null, has = false;
      for (let i = 0; i < s.length; i++){
        const c = s[i];
        if (q === "'"){ if (c === "'") q = null; else cur += c; }
        else if (q === '"'){
          if (c === '"') q = null;
          else if (c === '\\' && '"\\$`'.includes(s[i+1])) cur += s[++i];
          else cur += c;
        }
        else if (c === "'" || c === '"'){ q = c; has = true; }
        else if (c === '\\'){ cur += s[++i] ?? ''; }
        else if (/\s/.test(c)){ if (cur || has){ out.push(cur); cur = ''; has = false; } }
        else cur += c;
      }
      if (cur || has) out.push(cur);
      return out;
    };
    const run = () => {
      err.textContent = ''; $('#cu-fetch').value = ''; $('#cu-py').value = '';
      const v = inp.value.trim(); if (!v) return;
      const tk = tokens(v);
      if (tk[0] !== 'curl'){ err.textContent = 'Input should start with “curl”'; return; }
      const req = { method:'', url:'', headers:{}, data:[], form:[], user:null, insecure:false, follow:false };
      for (let i = 1; i < tk.length; i++){
        const t = tk[i];
        const next = () => tk[++i] ?? '';
        if (t === '-X' || t === '--request') req.method = next().toUpperCase();
        else if (t === '-H' || t === '--header'){
          const h = next(), ix = h.indexOf(':');
          if (ix > 0) req.headers[h.slice(0, ix).trim()] = h.slice(ix + 1).trim();
        }
        else if (['-d','--data','--data-raw','--data-binary','--data-ascii'].includes(t)) req.data.push(next());
        else if (t === '--data-urlencode') req.data.push(encodeURIComponent(next()).replace(/%3D/, '='));
        else if (t === '--json'){ req.data.push(next()); req.headers['Content-Type'] = 'application/json'; }
        else if (t === '-F' || t === '--form') req.form.push(next());
        else if (t === '-u' || t === '--user') req.user = next();
        else if (t === '-b' || t === '--cookie') req.headers['Cookie'] = next();
        else if (t === '-A' || t === '--user-agent') req.headers['User-Agent'] = next();
        else if (t === '-e' || t === '--referer') req.headers['Referer'] = next();
        else if (t === '-k' || t === '--insecure') req.insecure = true;
        else if (t === '-L' || t === '--location') req.follow = true;
        else if (t === '--url') req.url = next();
        else if (t === '-o' || t === '--output' || t === '--connect-timeout' || t === '-m' || t === '--max-time') next();
        else if (!t.startsWith('-') && !req.url) req.url = t;
      }
      if (!req.url){ err.textContent = 'No URL found in the command'; return; }
      const body = req.data.length ? req.data.join('&') : null;
      if (!req.method) req.method = (body || req.form.length) ? 'POST' : 'GET';
      let jsonBody = null;
      if (body){ try { jsonBody = JSON.parse(body); } catch {} }
      if (req.user) req.headers['Authorization'] = 'Basic ' + btoa(req.user.includes(':') ? req.user : req.user + ':');
      // fetch
      const fl = [`const res = await fetch(${JSON.stringify(req.url)}, {`];
      fl.push(`  method: ${JSON.stringify(req.method)},`);
      const hk = Object.keys(req.headers);
      if (hk.length){
        fl.push('  headers: {');
        hk.forEach(h => fl.push(`    ${JSON.stringify(h)}: ${JSON.stringify(req.headers[h])},`));
        fl.push('  },');
      }
      if (req.form.length){
        fl.unshift('const form = new FormData();',
          ...req.form.map(f => {
            const [k, val] = f.split(/=(.*)/s);
            return val?.startsWith('@')
              ? `form.append(${JSON.stringify(k)}, fileInput.files[0]); // was: ${val}`
              : `form.append(${JSON.stringify(k)}, ${JSON.stringify(val ?? '')});`;
          }), '');
        fl.push('  body: form,');
      } else if (body){
        fl.push(jsonBody !== null
          ? `  body: JSON.stringify(${JSON.stringify(jsonBody, null, 2).replace(/\n/g, '\n  ')}),`
          : `  body: ${JSON.stringify(body)},`);
      }
      fl.push('});');
      if (req.insecure) fl.push('// note: fetch cannot skip TLS verification (curl -k)');
      fl.push('const data = await res.json();');
      $('#cu-fetch').value = fl.join('\n');
      // python
      const pyStr = s => "'" + String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "'";
      const pl = ['import requests', '', `resp = requests.${req.method.toLowerCase() in {get:1,post:1,put:1,patch:1,delete:1,head:1} ? req.method.toLowerCase() : 'request'}(`];
      if (!(req.method.toLowerCase() in {get:1,post:1,put:1,patch:1,delete:1,head:1})) pl[2] = `resp = requests.request(${pyStr(req.method)},`;
      pl.push(`    ${pyStr(req.url)},`);
      const pyh = Object.entries(req.headers).filter(([k]) => k !== 'Authorization' || !req.user);
      if (pyh.length) pl.push(`    headers={${pyh.map(([k, val]) => `${pyStr(k)}: ${pyStr(val)}`).join(', ')}},`);
      if (req.user){ const [u, p] = req.user.split(/:(.*)/s); pl.push(`    auth=(${pyStr(u)}, ${pyStr(p ?? '')}),`); }
      if (req.form.length) pl.push(`    files={${req.form.map(f => { const [k, val] = f.split(/=(.*)/s); return val?.startsWith('@') ? `${pyStr(k)}: open(${pyStr(val.slice(1))}, 'rb')` : `${pyStr(k)}: (None, ${pyStr(val ?? '')})`; }).join(', ')}},`);
      else if (jsonBody !== null) pl.push(`    json=${JSON.stringify(jsonBody)},`);
      else if (body) pl.push(`    data=${pyStr(body)},`);
      if (req.insecure) pl.push('    verify=False,  # from curl -k — disables TLS verification, MITM risk; prefer trusting the CA');
      if (req.follow === false && req.method !== 'GET') {} // requests follows by default
      pl.push(')', 'print(resp.status_code, resp.text)');
      $('#cu-py').value = pl.join('\n');
    };
    inp.addEventListener('input', run);
    run();
  }
});

    const render = () => {
      if (!img) return;
      const max = Math.min(8000, Math.max(16, +$('#im-max').value || 1200));
      const k = Math.min(1, max / Math.max(img.width, img.height));

      cv.width = Math.max(1, Math.round(img.width * k));
      cv.height = Math.max(1, Math.round(img.height * k));

    const handle = f => {
      if (!f || !f.type.startsWith('image/')) return;

    file.addEventListener('change', () => handle(file.files[0]));
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('over'));
    drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); handle(e.dataTransfer.files[0]); });
    $('#im-q').addEventListener('input', () => { $('#im-qv').textContent = $('#im-q').value; render(); });
    ['im-max','im-fmt'].forEach(id => $('#'+id).addEventListener('change', render));
    dl.addEventListener('click', () => {
      const a = document.createElement('a');

  }
});

tool({
  id:'hmac', name:'HMAC', group:'Crypto',
  blurb:'Keyed-hash message authentication: sign data with a secret, or verify a signature you were given. The mechanism behind webhook verification (Stripe, GitHub) and JWT HS256.',
  html: `
    <div class="row">
      <select id="hm-algo"><option value="SHA-256" selected>SHA-256</option><option value="SHA-1">SHA-1</option><option value="SHA-384">SHA-384</option><option value="SHA-512">SHA-512</option></select>
      <select id="hm-keyfmt"><option value="text" selected>key: text</option><option value="hex">key: hex</option><option value="b64">key: base64</option></select>
      <select id="hm-outfmt"><option value="hex" selected>out: hex</option><option value="b64">out: base64</option></select>
    </div>
    <label class="lbl">Secret key</label>
    <input type="text" id="hm-key" spellcheck="false" placeholder="whsec_…">
    <label class="lbl">Message</label>
    <textarea id="hm-msg" spellcheck="false" placeholder="the payload to sign"></textarea>
    <label class="lbl">Signature ${cpyBtn('#hm-out')}</label>
    <textarea id="hm-out" readonly></textarea>
    <label class="lbl">Verify against (optional)</label>
    <div class="row">
      <input class="grow" type="text" id="hm-exp" spellcheck="false" placeholder="paste a signature to compare">
      <span id="hm-vres" style="font-size:.9rem"></span>
    </div>
    <div class="err" id="hm-err"></div>
    ${shPanel('hmac', [
      {why:'sign with openssl', cmd:`printf %s 'payload' | openssl dgst -sha256 -hmac 'secret'`},
      {why:'GitHub-style hex signature', cmd:`printf %s "$BODY" | openssl dgst -sha256 -hmac "$SECRET" | sed 's/^.* //'`},
      {why:'base64 output (Stripe, Slack style)', cmd:`printf %s 'payload' | openssl dgst -sha256 -hmac 'secret' -binary | base64`},
    ])}`,
  wire(){
    const msg = $('#hm-msg'), key = $('#hm-key'), out = $('#hm-out'), err = $('#hm-err');
    const exp = $('#hm-exp'), vres = $('#hm-vres');
    let seq = 0;
    const keyBytes = () => {
      const f = $('#hm-keyfmt').value, v = key.value;
      if (f === 'hex'){
        const c = v.replace(/[\s0x]/gi,''); if (c.length % 2 || /[^0-9a-f]/i.test(c)) throw 'key is not valid hex';
        const b = new Uint8Array(c.length/2); for (let i=0;i<b.length;i++) b[i]=parseInt(c.substr(i*2,2),16); return b;
      }
      if (f === 'b64') return b64ToBytes(v.trim());
      return te.encode(v);
    };
    const run = async () => {
      const my = ++seq;
      err.textContent = ''; out.value = ''; vres.textContent = '';
      if (!key.value || !msg.value) return;
      if (!crypto.subtle){ err.textContent = 'WebCrypto unavailable'; return; }
      let kb;
      try { kb = keyBytes(); } catch (e){ err.textContent = String(e); return; }
      try {
        const algo = $('#hm-algo').value;
        const k = await crypto.subtle.importKey('raw', kb, { name:'HMAC', hash: algo }, false, ['sign']);
        const sig = new Uint8Array(await crypto.subtle.sign('HMAC', k, te.encode(msg.value)));
        if (my !== seq) return;
        const hex = [...sig].map(hex2).join('');
        out.value = $('#hm-outfmt').value === 'b64' ? bytesToB64(sig) : hex;
        if (exp.value.trim()){
          const e = exp.value.trim().replace(/^sha256=/i,'').toLowerCase();
          const match = e === hex.toLowerCase() || e === bytesToB64(sig).toLowerCase() || e === out.value.toLowerCase();
          vres.innerHTML = match ? '<span style="color:var(--good)">✓ signature matches</span>'
                                 : '<span style="color:var(--bad)">✗ does not match</span>';
        }
        setSh('hmac', 0, `printf %s ${shq(shTrim(msg.value, 40))} | openssl dgst -${algo.toLowerCase().replace('-','')} -hmac ${shq(shTrim(key.value, 30))}`);
      } catch { err.textContent = 'Signing failed'; }
    };
    [msg, key, exp].forEach(el => el.addEventListener('input', run));
    ['hm-algo','hm-keyfmt','hm-outfmt'].forEach(id => $('#'+id).addEventListener('change', run));
  }
});

tool({
  id:'jsonquery', name:'JSON query', group:'Text',
  blurb:'Pull values out of a JSON blob with a path expression — dot keys, [index], [*] wildcards and ..recursive descent. A pocket jq for poking at API responses.',
  html: `
    <label class="lbl">Path <span style="text-transform:none;letter-spacing:0;color:var(--faint)">e.g. <code>$.users[*].name</code> · <code>$..id</code> · <code>$.items[0]</code></span></label>
    <input type="text" id="jq-path" spellcheck="false" value="$.users[*].name">
    <label class="lbl">JSON</label>
    <textarea id="jq-in" spellcheck="false" style="min-height:140px">{
  "users": [
    { "name": "Ada", "id": 1 },
    { "name": "Grace", "id": 2 }
  ],
  "count": 2
}</textarea>
    <div class="err" id="jq-err"></div>
    <label class="lbl">Result <span id="jq-n" style="text-transform:none;letter-spacing:0;color:var(--accent-2)"></span> ${cpyBtn('#jq-out')}</label>
    <textarea id="jq-out" readonly style="min-height:120px"></textarea>
    ${shPanel('jsonquery', [
      {why:'the real thing', cmd:`jq '.users[].name' data.json`},
      {why:'recursive descent', cmd:`jq '.. | .id? // empty' data.json`},
      {why:'an index', cmd:`jq '.items[0]' data.json`},
    ])}
    <p class="note">Supported: <code>$</code> root, <code>.key</code>, <code>['key']</code>, <code>[n]</code>, <code>[*]</code> wildcard, <code>..key</code> recursive descent. Filters and slices are out of scope — use jq for those.</p>`,
  wire(){
    const path = $('#jq-path'), inp = $('#jq-in'), out = $('#jq-out'), err = $('#jq-err'), nlab = $('#jq-n');
    const tokenize = p => {
      const t = []; let i = 0; p = p.trim();
      if (p[0] === '$') i = 1;
      while (i < p.length){
        if (p.startsWith('..', i)){
          i += 2; const m = /^[\w$]+/.exec(p.slice(i)); if (!m) throw 'expected name after ".."';
          t.push({ op:'rdesc', key:m[0] }); i += m[0].length;
        } else if (p[i] === '.'){
          i++;
          if (p[i] === '*'){ t.push({ op:'wild' }); i++; }
          else { const m = /^[\w$]+/.exec(p.slice(i)); if (!m) throw 'expected key after "."'; t.push({ op:'key', key:m[0] }); i += m[0].length; }
        } else if (p[i] === '['){
          const c = p.indexOf(']', i); if (c < 0) throw 'unclosed "["';
          const inside = p.slice(i+1, c).trim();
          if (inside === '*') t.push({ op:'wild' });
          else if (/^\d+$/.test(inside)) t.push({ op:'index', idx:+inside });
          else if (/^'.*'$|^".*"$/.test(inside)) t.push({ op:'key', key:inside.slice(1,-1) });
          else throw `bad selector [${inside}]`;
          i = c + 1;
        } else if (/[\w$]/.test(p[i])){
          const m = /^[\w$]+/.exec(p.slice(i)); t.push({ op:'key', key:m[0] }); i += m[0].length;
        } else throw `unexpected "${p[i]}"`;
      }
      return t;
    };
    const evalPath = (data, tokens) => {
      let nodes = [data];
      for (const tk of tokens){
        const next = [];
        for (const n of nodes){
          if (n == null) continue;
          if (tk.op === 'key'){ if (typeof n === 'object' && !Array.isArray(n) && tk.key in n) next.push(n[tk.key]); }
          else if (tk.op === 'index'){ if (Array.isArray(n) && tk.idx < n.length) next.push(n[tk.idx]); }
          else if (tk.op === 'wild'){ if (Array.isArray(n)) next.push(...n); else if (typeof n === 'object') next.push(...Object.values(n)); }
          else if (tk.op === 'rdesc'){
            const walk = x => {
              if (x && typeof x === 'object'){
                if (!Array.isArray(x) && tk.key in x) next.push(x[tk.key]);
                for (const v of Object.values(x)) walk(v);
              }
            };
            walk(n);
          }
        }
        nodes = next;
      }
      return nodes;
    };
    const run = () => {
      err.textContent = ''; out.value = ''; nlab.textContent = '';
      const src = inp.value.trim(); if (!src) return;
      let data;
      try { data = JSON.parse(src); } catch (e){ err.textContent = 'Invalid JSON: ' + e.message; return; }
      let tokens;
      try { tokens = tokenize(path.value); } catch (e){ err.textContent = 'Path error: ' + e; return; }
      const res = evalPath(data, tokens);
      nlab.textContent = `· ${res.length} match${res.length === 1 ? '' : 'es'}`;
      out.value = res.length === 1 && tokens.every(t => t.op === 'key' || t.op === 'index')
        ? (typeof res[0] === 'object' ? JSON.stringify(res[0], null, 2) : String(res[0]))
        : JSON.stringify(res, null, 2);
      setSh('jsonquery', 0, `jq ${shq(path.value.replace(/^\$\.?/, '.').replace(/\[\*\]/g,'[]') || '.')} data.json`);
    };
    [path, inp].forEach(el => el.addEventListener('input', run));
    run();
  }
});

/* ── markdown preview ──────────────────────────────────────── */
tool({
  id:'md', name:'Markdown preview', group:'Text',
  blurb:'Live Markdown rendering with the generated HTML alongside. Headings, lists, tables, code, links, images, blockquotes and inline styles — links and images are sanitized to safe schemes.',
  html: `
    <div class="md-split">
      <div><label class="lbl" style="margin-top:0">Markdown</label>
        <textarea id="md-in" spellcheck="false"># powertoy

A **single file**, _fully offline_.

## Features
- 70 tools
- No \`network\` calls
- Pipe one into another

> Built for developers.

\`\`\`js
const x = 42;
\`\`\`

| Tool | Group |
|------|-------|
| HMAC | Crypto |
| QR   | Encode |

[Learn more](https://example.com)
</textarea></div>
      <div><label class="lbl" style="margin-top:0">Preview</label>
        <div class="md-prev" id="md-prev"></div></div>
    </div>
    <label class="lbl">HTML source ${cpyBtn('#md-html')}</label>
    <textarea id="md-html" readonly style="min-height:100px"></textarea>
    ${shPanel('md', [
      {why:'pandoc renders markdown to anything', cmd:`pandoc -f markdown -t html README.md`},
      {why:'GitHub-flavored to a standalone page', cmd:`pandoc -f gfm -s README.md -o readme.html`},
    ])}`,
  wire(){
    const inp = $('#md-in'), prev = $('#md-prev'), html = $('#md-html');
    const e = s => s.replace(/[&<>]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[c]));
    const inline = s => e(s)
      .replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`)
      .replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s[^)]*)?\)/g, (m, a, u) =>
        /^(https?:|data:image\/|\/|\.\.?\/)/.test(u) ? `<img alt="${a}" src="${u}" style="max-width:100%">` : e(m))
      .replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s[^)]*)?\)/g, (m, t, u) =>
        /^(https?:|mailto:|#|\/|\.\.?\/)/.test(u) ? `<a href="${u}" target="_blank" rel="noopener">${t}</a>` : e(m))
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/__([^_]+)__/g, '<strong>$1</strong>')
      .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>')
      .replace(/(^|[^_])_([^_\n]+)_/g, '$1<em>$2</em>')
      .replace(/~~([^~]+)~~/g, '<del>$1</del>');
    const render = src => {
      const codes = [];
      src = src.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        codes.push(`<pre><code>${e(code.replace(/\n$/, ''))}</code></pre>`);
        return `␀C${codes.length - 1}␀`;
      });
      const lines = src.split('\n'), out = [];
      let i = 0;
      const flushP = buf => { if (buf.length){ out.push('<p>' + buf.map(inline).join('<br>') + '</p>'); buf.length = 0; } };
      const pbuf = [];
      while (i < lines.length){
        const ln = lines[i];
        let m;
        if (/^␀C\d+␀$/.test(ln.trim())){ flushP(pbuf); out.push(codes[+ln.trim().slice(2, -1)]); i++; }
        else if (!ln.trim()){ flushP(pbuf); i++; }
        else if (m = ln.match(/^(#{1,6})\s+(.*)$/)){ flushP(pbuf); out.push(`<h${m[1].length}>${inline(m[2])}</h${m[1].length}>`); i++; }
        else if (/^(\s*)([-*_])(\s*\2){2,}\s*$/.test(ln)){ flushP(pbuf); out.push('<hr>'); i++; }
        else if (/^>\s?/.test(ln)){
          flushP(pbuf); const q = [];
          while (i < lines.length && /^>\s?/.test(lines[i])){ q.push(lines[i].replace(/^>\s?/, '')); i++; }
          out.push('<blockquote>' + q.map(inline).join('<br>') + '</blockquote>');
        }
        else if (/^\s*\|.*\|\s*$/.test(ln) && i+1 < lines.length && /^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i+1]) && lines[i+1].includes('-')){
          flushP(pbuf);
          const cells = r => r.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
          const head = cells(ln); i += 2;
          const rows = [];
          while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){ rows.push(cells(lines[i])); i++; }
          out.push('<table><thead><tr>' +
            head.map(h => `<th>${inline(h)}</th>`).join('') +
            '</tr></thead><tbody>' +
            rows.map(r => '<tr>' + r.map(c => `<td>${inline(c)}</td>`).join('') + '</tr>').join('') +
            '</tbody></table>');
        }
        else if (m = ln.match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/)){
          flushP(pbuf);
          const ordered = /\d/.test(m[2]);
          const items = [];
          while (i < lines.length && (m = lines[i].match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/))){ items.push(inline(m[3])); i++; }
          const tag = ordered ? 'ol' : 'ul';
          out.push(`<${tag}>` + items.map(it => `<li>${it}</li>`).join('') + `</${tag}>`);
        }
        else { pbuf.push(ln); i++; }
      }
      flushP(pbuf);
      return out.join('\n');
    };
    const run = () => {
      const h = render(inp.value);
      prev.innerHTML = h || '<span style="color:var(--faint)">empty</span>';

tool({
  id:'jwtsign', name:'JWT signer', group:'Crypto',
  blurb:'Mint a signed JWT (HS256/384/512) for testing — edit the header and payload, set the secret, get a token you can paste into the decoder. Signing only, HMAC family.',
  html: `
    <div class="row">
      <select id="jws-alg"><option>HS256</option><option>HS384</option><option>HS512</option></select>
      <label class="check"><input type="checkbox" id="jws-iat" checked> auto iat</label>
      <label class="check">+ exp <input type="number" id="jws-exp" value="3600" style="width:5.5rem"> s (0 = none)</label>
    </div>
    <label class="lbl">Header</label>
    <textarea id="jws-header" spellcheck="false" style="min-height:60px">{ "alg": "HS256", "typ": "JWT" }</textarea>
    <label class="lbl">Payload</label>
    <textarea id="jws-payload" spellcheck="false" style="min-height:90px">{ "sub": "1234567890", "name": "Ada Lovelace" }</textarea>
    <label class="lbl">Secret</label>
    <input type="text" id="jws-secret" spellcheck="false" value="your-256-bit-secret">
    <div class="err" id="jws-err"></div>
    <label class="lbl">Token ${cpyBtn('#jws-out')}</label>
    <textarea id="jws-out" readonly style="min-height:90px"></textarea>
    ${shPanel('jwtsign', [
      {why:'sign an HS256 JWT in one shell line', cmd:`h=$(printf %s '{"alg":"HS256","typ":"JWT"}'|basenc --base64url|tr -d '='); p=$(printf %s '{"sub":"1"}'|basenc --base64url|tr -d '='); s=$(printf %s "$h.$p"|openssl dgst -sha256 -hmac 'secret' -binary|basenc --base64url|tr -d '='); echo "$h.$p.$s"`},
    ])}`,
  wire(){
    const b64url = bytes => bytesToB64(bytes).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const hdr = $('#jws-header'), pl = $('#jws-payload'), sec = $('#jws-secret'), out = $('#jws-out'), err = $('#jws-err');
    let seq = 0;
    const run = async () => {
      const my = ++seq;
      err.textContent = ''; out.value = '';
      if (!crypto.subtle){ err.textContent = 'WebCrypto unavailable'; return; }
      const alg = $('#jws-alg').value, hash = 'SHA-' + alg.slice(2);
      let header, payload;
      try { header = JSON.parse(hdr.value); } catch { err.textContent = 'Header is not valid JSON'; return; }
      try { payload = JSON.parse(pl.value); } catch { err.textContent = 'Payload is not valid JSON'; return; }
      header.alg = alg; if (!header.typ) header.typ = 'JWT';
      const now = Math.floor(Date.now() / 1000);
      if ($('#jws-iat').checked) payload.iat = now;
      const expS = +$('#jws-exp').value || 0;
      if (expS > 0) payload.exp = now + expS;
      try {
        const signing = b64url(te.encode(JSON.stringify(header))) + '.' + b64url(te.encode(JSON.stringify(payload)));
        const key = await crypto.subtle.importKey('raw', te.encode(sec.value), { name:'HMAC', hash }, false, ['sign']);
        const sig = new Uint8Array(await crypto.subtle.sign('HMAC', key, te.encode(signing)));
        if (my !== seq) return;
        out.value = signing + '.' + b64url(sig);
      } catch { err.textContent = 'Signing failed'; }
    };
    [hdr, pl, sec].forEach(el => el.addEventListener('input', run));
    ['jws-alg','jws-iat','jws-exp'].forEach(id => $('#'+id).addEventListener('input', run));
    run();
  }
});

/* ── id decoder ────────────────────────────────────────────── */
tool({
  id:'iddecode', name:'ID decoder', group:'Crypto',
  blurb:'Paste a time-based ID — ULID, UUID v7/v1, Snowflake or Mongo ObjectId — and read the timestamp baked into it. The inverse of the ID generator.',
  html: `
    <label class="lbl">ID</label>
    <input type="text" id="idd-in" spellcheck="false" value="01ARZ3NDEKTSV4RRFFQ69G5FAV">
    <div class="err" id="idd-err"></div>
    <div class="outs">
      ${outRow('Detected type','idd-type')}
      ${outRow('Timestamp (ms)','idd-ts')}
      ${outRow('UTC','idd-utc')}
      ${outRow('Relative','idd-rel')}
      ${outRow('Notes','idd-note')}
    </div>
    ${shPanel('iddecode', [
      {why:'ObjectId timestamp (first 4 bytes, seconds)', cmd:`python3 -c 'import sys,datetime; print(datetime.datetime.utcfromtimestamp(int(sys.argv[1][:8],16)))' 65f99c110309d4610309d461`},
      {why:'Snowflake (Twitter epoch)', cmd:`python3 -c 'import sys; print((int(sys.argv[1])>>22)+1288834974657)' 1541815603606036480`},
    ])}`,
  wire(){
    const inp = $('#idd-in'), err = $('#idd-err');
    const rtf = new Intl.RelativeTimeFormat('en', { numeric:'auto' });
    const rel = ms => {
      const s = Math.round((ms - Date.now()) / 1000), a = Math.abs(s);
      if (a < 90) return rtf.format(s, 'second');
      if (a < 5400) return rtf.format(Math.round(s/60), 'minute');
      if (a < 129600) return rtf.format(Math.round(s/3600), 'hour');
      if (a < 5184000) return rtf.format(Math.round(s/86400), 'day');
      return rtf.format(Math.round(s/2629800), 'month');
    };
    const detect = raw => {
      const v = raw.trim();
      const hex = v.replace(/-/g, '').toLowerCase();
      // UUID (with or without dashes)
      if (/^[0-9a-f]{32}$/.test(hex)){
        const ver = hex[12];
        if (ver === '7') return { type:'UUID v7', ms: parseInt(hex.slice(0,12), 16) };
        if (ver === '1'){
          const ts = (BigInt('0x' + hex.slice(13,16) + hex.slice(8,12) + hex.slice(0,8)));
          const ms = Number(ts / 10000n - 12219292800000n);
          return { type:'UUID v1', ms, note:'60-bit Gregorian timestamp' };
        }
        return { type:`UUID v${parseInt(ver,16)||'?'}`, ms: null, note:'this UUID version carries no timestamp' };
      }
      // Mongo ObjectId
      if (/^[0-9a-f]{24}$/.test(v.toLowerCase()))
        return { type:'Mongo ObjectId', ms: parseInt(v.slice(0,8), 16) * 1000, note:'4-byte seconds timestamp' };
      // ULID
      if (/^[0-9A-HJKMNP-TV-Z]{26}$/i.test(v)){
        const A = '0123456789ABCDEFGHJKMNPQRSTVWXYZ';
        let ms = 0;
        for (const c of v.slice(0, 10).toUpperCase()){ const d = A.indexOf(c); if (d < 0) return null; ms = ms * 32 + d; }
        return { type:'ULID', ms, note:'48-bit ms timestamp + 80 random bits' };
      }
      // Snowflake (numeric, large)
      if (/^\d{15,20}$/.test(v)){
        const id = BigInt(v);
        const tw = Number(id >> 22n) + 1288834974657;   // Twitter/X epoch
        const dc = Number(id >> 22n) + 1420070400000;   // Discord epoch
        return { type:'Snowflake', ms: tw, note:`Twitter epoch shown; Discord epoch → ${new Date(dc).toISOString()}` };
      }
      return null;
    };
    const run = () => {
      err.textContent = '';
      ['idd-type','idd-ts','idd-utc','idd-rel','idd-note'].forEach(id => $('#'+id).textContent = '—');
      if (!inp.value.trim()) return;
      const d = detect(inp.value);
      if (!d){ err.textContent = 'Not a recognized ULID / UUID / Snowflake / ObjectId'; return; }
      $('#idd-type').textContent = d.type;
      $('#idd-note').textContent = d.note || '—';
      if (d.ms == null || !isFinite(d.ms)){ $('#idd-ts').textContent = 'n/a'; return; }
      $('#idd-ts').textContent = String(d.ms);
      $('#idd-utc').textContent = new Date(d.ms).toISOString();
      $('#idd-rel').textContent = rel(d.ms);
    };
    inp.addEventListener('input', run); run();
  }
});

/* ── ieee 754 ──────────────────────────────────────────────── */
tool({
  id:'ieee', name:'IEEE 754 float', group:'Convert',
  blurb:'See how a number is actually stored as a floating-point value: sign, exponent and mantissa bits, the raw hex, and the nearest representable decimal — the reason 0.1 + 0.2 ≠ 0.3.',
  html: `
    <div class="row">
      <input type="text" id="ie-in" spellcheck="false" value="0.1" style="max-width:16rem">
      <div class="seg" id="ie-prec"><button class="on" data-p="64">double (64-bit)</button><button data-p="32">single (32-bit)</button></div>
    </div>
    <div class="err" id="ie-err"></div>
    <div class="outs">
      ${outRow('Sign','ie-sign')}
      ${outRow('Exponent','ie-exp')}
      ${outRow('Mantissa','ie-mant')}
      ${outRow('Bits','ie-bits')}
      ${outRow('Hex','ie-hex')}
      ${outRow('Nearest stored','ie-stored')}
    </div>
    ${shPanel('ieee', [
      {why:'the bits of a double in python', cmd:`python3 -c 'import struct,sys; print(struct.pack(">d", float(sys.argv[1])).hex())' 0.1`},
      {why:'the bits of a 32-bit float', cmd:`python3 -c 'import struct,sys; print(struct.pack(">f", float(sys.argv[1])).hex())' 0.1`},
    ])}`,
  wire(){
    const inp = $('#ie-in'), err = $('#ie-err');
    let prec = 64;
    const run = () => {
      err.textContent = '';
      ['ie-sign','ie-exp','ie-mant','ie-bits','ie-hex','ie-stored'].forEach(id => $('#'+id).textContent = '—');
      const t = inp.value.trim(); if (!t) return;
      const x = t === 'Infinity' || t === '-Infinity' || t === 'NaN' ? Number(t) : parseFloat(t);
      if (Number.isNaN(x) && t !== 'NaN'){ err.textContent = 'Not a number'; return; }
      const bytes = prec === 64 ? 8 : 4, ebits = prec === 64 ? 11 : 8, mbits = prec === 64 ? 52 : 23, bias = prec === 64 ? 1023 : 127;
      const buf = new ArrayBuffer(bytes), dv = new DataView(buf);
      if (prec === 64) dv.setFloat64(0, x); else dv.setFloat32(0, x);
      let bits = '';
      for (let i = 0; i < bytes; i++) bits += dv.getUint8(i).toString(2).padStart(8, '0');
      const sign = bits[0], expb = bits.slice(1, 1 + ebits), mant = bits.slice(1 + ebits);
      const rawExp = parseInt(expb, 2);
      $('#ie-sign').textContent = `${sign}  (${sign === '0' ? '+' : '−'})`;
      $('#ie-exp').textContent = `${expb}  = ${rawExp}` + (rawExp === 0 || rawExp === (2**ebits - 1) ? '' : `, unbiased ${rawExp - bias}`);
      $('#ie-mant').textContent = mant;
      $('#ie-bits').textContent = `${sign} ${expb} ${mant}`;
      $('#ie-hex').textContent = '0x' + [...new Uint8Array(buf)].map(hex2).join('');
      const stored = prec === 64 ? dv.getFloat64(0) : dv.getFloat32(0);
      $('#ie-stored').textContent = Number.isFinite(stored) ? stored.toPrecision(prec === 64 ? 17 : 9) : String(stored);
      setSh('ieee', 0, `python3 -c 'import struct,sys; print(struct.pack(">${prec===64?'d':'f'}", float(sys.argv[1])).hex())' ${shq(t)}`);
    };
    inp.addEventListener('input', run);
    $$('#ie-prec button').forEach(b => b.addEventListener('click', () => {
      $$('#ie-prec button').forEach(x => x.classList.remove('on')); b.classList.add('on'); prec = +b.dataset.p; run();
    }));
    run();
  }
});

tool({
  id:'bezier', name:'Easing curve', group:'Convert',
  blurb:'Design a CSS cubic-bezier() easing curve by dragging the two control points, watch the motion preview, and copy the value. Standard presets and overshoot supported.',
  html: `
    <div class="row">
      <select id="bz-preset">
        <option value=".25,.1,.25,1">ease</option>
        <option value="0,0,1,1">linear</option>
        <option value=".42,0,1,1">ease-in</option>
        <option value="0,0,.58,1">ease-out</option>
        <option value=".42,0,.58,1">ease-in-out</option>
        <option value=".6,-.28,.74,.05">back-in (overshoot)</option>
        <option value=".18,.89,.32,1.28">back-out (overshoot)</option>
        <option value=".68,-.55,.27,1.55">anticipate</option>
      </select>
      <span class="ratio-big" id="bz-val" style="font-size:1.05rem">cubic-bezier(0.25, 0.1, 0.25, 1)</span>
      <button class="cpy" data-copy="#bz-val">Copy</button>
    </div>
    <div style="display:flex;gap:1.5rem;flex-wrap:wrap;align-items:flex-start;margin-top:.7rem">
      <svg id="bz-svg" width="240" height="260" style="border:1px solid var(--border);border-radius:8px;background:var(--surface);touch-action:none;flex:0 0 auto"></svg>
      <div style="flex:1 1 200px;min-width:200px">
        <label class="lbl" style="margin-top:0">Motion preview</label>
        <div style="position:relative;height:30px;background:var(--code-bg);border-radius:999px;overflow:hidden;border:1px solid var(--border)">
          <div id="bz-dot" style="position:absolute;top:2px;left:0;width:24px;height:24px;border-radius:50%;background:var(--accent)"></div>
        </div>
        <button class="ghost" id="bz-replay" style="margin-top:.7rem">▶ Replay</button>
        <p class="note" style="margin-top:.8rem">Drag the two dots. The X axis is time, Y is progress — pull a handle above the box or below it for overshoot/anticipation effects.</p>
      </div>
    </div>
    ${shPanel('bezier', [
      {why:'drop it straight into CSS', cmd:`transition: transform .4s cubic-bezier(0.25, 0.1, 0.25, 1);`},
      {why:'as a keyframe animation', cmd:`animation: slide .4s cubic-bezier(0.25, 0.1, 0.25, 1) both;`},
    ])}`,
  wire(){
    const SZ = 200, PADX = 20, PADY = 30;
    const svg = $('#bz-svg'), dot = $('#bz-dot');
    let p = [0.25, 0.1, 0.25, 1];
    const X = bx => PADX + bx * SZ, Y = by => PADY + (1 - by) * SZ;
    const draw = () => {
      const [x1, y1, x2, y2] = p;
      svg.innerHTML =
        `<rect x="${PADX}" y="${PADY}" width="${SZ}" height="${SZ}" fill="none" stroke="var(--border)"/>` +
        `<line x1="${X(0)}" y1="${Y(0)}" x2="${X(1)}" y2="${Y(1)}" stroke="var(--border-2)" stroke-dasharray="3 3"/>` +
        `<line x1="${X(0)}" y1="${Y(0)}" x2="${X(x1)}" y2="${Y(y1)}" stroke="var(--accent)" stroke-width="1.5"/>` +
        `<line x1="${X(1)}" y1="${Y(1)}" x2="${X(x2)}" y2="${Y(y2)}" stroke="var(--accent-2)" stroke-width="1.5"/>` +
        `<path d="M ${X(0)} ${Y(0)} C ${X(x1)} ${Y(y1)}, ${X(x2)} ${Y(y2)}, ${X(1)} ${Y(1)}" fill="none" stroke="var(--ink)" stroke-width="2"/>` +
        `<circle data-h="0" cx="${X(x1)}" cy="${Y(y1)}" r="7" fill="var(--accent)" style="cursor:grab"/>` +
        `<circle data-h="1" cx="${X(x2)}" cy="${Y(y2)}" r="7" fill="var(--accent-2)" style="cursor:grab"/>`;
      $('#bz-val').textContent = `cubic-bezier(${p.map(n => +n.toFixed(2)).join(', ')})`;
    };
    const animate = () => {
      dot.getAnimations().forEach(a => a.cancel());
      try {
        dot.animate([{ left:'0px' }, { left:'calc(100% - 24px)' }],
          { duration:1200, easing: $('#bz-val').textContent, iterations:Infinity, direction:'alternate' });
      } catch {}
    };
    let dragging = null;
    const local = e => { const r = svg.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; };
    svg.addEventListener('pointerdown', e => {
      const h = e.target.dataset?.h; if (h === undefined) return;
      dragging = +h; svg.setPointerCapture(e.pointerId);
    });
    svg.addEventListener('pointermove', e => {
      if (dragging === null) return;
      const { x, y } = local(e);
      p[dragging*2] = Math.max(0, Math.min(1, (x - PADX) / SZ));
      p[dragging*2+1] = Math.max(-0.6, Math.min(1.6, 1 - (y - PADY) / SZ));
      draw();
    });
    const stop = () => { if (dragging !== null){ dragging = null; animate(); } };
    svg.addEventListener('pointerup', stop);
    svg.addEventListener('pointercancel', stop);
    $('#bz-preset').addEventListener('change', e => { p = e.target.value.split(',').map(Number); draw(); animate(); });
    $('#bz-replay').addEventListener('click', animate);
    draw(); animate();
  }
});

/* ── x.509 certificate decoder ─────────────────────────────── */
tool({
  id:'x509', name:'Certificate decoder', group:'Crypto',
  blurb:'Paste a PEM certificate and read what is inside: subject, issuer, SANs, validity window, serial, signature algorithm and key. A from-scratch ASN.1/DER parser — nothing leaves the tab.',
  html: `
    <label class="lbl">PEM certificate</label>
    <textarea id="x5-in" spellcheck="false" style="min-height:140px;font-size:.78rem" placeholder="-----BEGIN CERTIFICATE-----&#10;MIID…&#10;-----END CERTIFICATE-----"></textarea>
    <div class="err" id="x5-err"></div>
    <div class="outs" id="x5-out" style="display:none">
      ${outRow('Subject','x5-subject')}
      ${outRow('Common name','x5-cn')}
      ${outRow('SAN','x5-san')}
      ${outRow('Issuer','x5-issuer')}
      ${outRow('Self-signed','x5-self')}
      ${outRow('Valid from','x5-from')}
      ${outRow('Valid until','x5-until')}
      ${outRow('Status','x5-status')}
      ${outRow('Serial','x5-serial')}
      ${outRow('Signature','x5-sig')}
      ${outRow('Public key','x5-key')}
      ${outRow('Version','x5-ver')}
    </div>
    ${shPanel('x509', [
      {why:'the canonical viewer', cmd:`openssl x509 -in cert.pem -noout -text`},
      {why:'just the essentials', cmd:`openssl x509 -in cert.pem -noout -subject -issuer -dates -ext subjectAltName`},
      {why:'inspect a live server', cmd:`echo | openssl s_client -connect example.com:443 2>/dev/null | openssl x509 -noout -text`},
    ])}
    <p class="note">Parses X.509 v3 with RSA and EC keys. Reads the structure only — it does not validate the signature or chain.</p>`,
  wire(){
    const inp = $('#x5-in'), err = $('#x5-err'), box = $('#x5-out');
    const OIDS = {
      '2.5.4.3':'CN','2.5.4.6':'C','2.5.4.7':'L','2.5.4.8':'ST','2.5.4.9':'STREET',
      '2.5.4.10':'O','2.5.4.11':'OU','2.5.4.5':'serialNumber','0.9.2342.19200300.100.1.25':'DC',
      '1.2.840.113549.1.9.1':'E',
      '1.2.840.113549.1.1.1':'RSA','1.2.840.113549.1.1.5':'SHA1withRSA',
      '1.2.840.113549.1.1.11':'SHA256withRSA','1.2.840.113549.1.1.12':'SHA384withRSA',
      '1.2.840.113549.1.1.13':'SHA512withRSA','1.2.840.113549.1.1.10':'RSASSA-PSS',
      '1.2.840.10045.2.1':'EC','1.2.840.10045.4.3.2':'ECDSAwithSHA256',
      '1.2.840.10045.4.3.3':'ECDSAwithSHA384','1.2.840.10045.4.3.4':'ECDSAwithSHA512',
      '1.2.840.10045.3.1.7':'P-256 (prime256v1)','1.3.132.0.34':'P-384 (secp384r1)','1.3.132.0.35':'P-521 (secp521r1)',
      '1.3.101.112':'Ed25519',
      '2.5.29.17':'subjectAltName','2.5.29.19':'basicConstraints','2.5.29.15':'keyUsage',
    };
    const parseTLV = (buf, start, end) => {
      const nodes = [];
      let i = start;
      while (i < end - 1){
        const tagByte = buf[i];
        const cls = tagByte >> 6, constructed = (tagByte & 0x20) !== 0;
        let tag = tagByte & 0x1f, j = i + 1;
        if (tag === 0x1f){ tag = 0; do { tag = (tag << 7) | (buf[j] & 0x7f); } while (buf[j++] & 0x80); }
        let len = buf[j++];
        if (len & 0x80){ const n = len & 0x7f; len = 0; for (let k = 0; k < n; k++) len = len * 256 + buf[j++]; }
        const cs = j, ce = j + len;
        if (ce > end) break;
        const node = { cls, constructed, tag, start: i, cs, ce, bytes: buf.subarray(cs, ce) };
        if (constructed) node.children = parseTLV(buf, cs, ce);
        nodes.push(node);
        i = ce;
      }
      return nodes;
    };
    const oid = b => {
      const parts = [Math.floor(b[0] / 40), b[0] % 40];
      let n = 0;
      for (let i = 1; i < b.length; i++){ n = n * 128 + (b[i] & 0x7f); if (!(b[i] & 0x80)){ parts.push(n); n = 0; } }
      return parts.join('.');
    };
    const oidName = b => { const s = oid(b); return OIDS[s] || s; };
    const name = node => {
      const parts = [];
      for (const set of (node.children || [])){
        for (const seq of (set.children || [])){
          if (!seq.children || seq.children.length < 2) continue;
          const k = oidName(seq.children[0].bytes);
          const v = td.decode(seq.children[1].bytes);
          parts.push(`${k}=${v}`);
        }
      }
      return parts;
    };
    const parseTime = node => {
      const s = td.decode(node.bytes);
      let y;
      if (node.tag === 23){ y = +s.slice(0,2); y = y < 50 ? 2000 + y : 1900 + y; }
      else y = +s.slice(0,4);
      const o = node.tag === 23 ? 2 : 4;
      return new Date(Date.UTC(y, +s.slice(o,o+2) - 1, +s.slice(o+2,o+4), +s.slice(o+4,o+6), +s.slice(o+6,o+8), +s.slice(o+8,o+10) || 0));
    };
    const run = () => {
      err.textContent = ''; box.style.display = 'none';
      const pem = inp.value.trim(); if (!pem) return;
      const m = pem.match(/-----BEGIN CERTIFICATE-----([\s\S]*?)-----END CERTIFICATE-----/);
      let der;
      try { der = b64ToBytes((m ? m[1] : pem).replace(/\s/g,'')); }
      catch { err.textContent = 'Could not base64-decode the certificate body'; return; }
      let cert;
      try {
        cert = parseTLV(der, 0, der.length)[0];
        if (!cert || !cert.children) throw 0;
        const tbs = cert.children[0];
        const ch = tbs.children;
        let idx = 0, ver = 1;
        if (ch[0].cls === 2 && ch[0].tag === 0){ ver = (ch[0].children[0].bytes[0] || 0) + 1; idx = 1; }
        const serial = ch[idx++];
        idx++; // inner signature algorithm (repeat of outer)
        const issuer = ch[idx++];
        const validity = ch[idx++];
        const subject = ch[idx++];
        const spki = ch[idx++];
        const exts = ch.find(c => c.cls === 2 && c.tag === 3);

        const subjParts = name(subject), issParts = name(issuer);
        const cn = subjParts.find(p => p.startsWith('CN='));
        const nb = parseTime(validity.children[0]), na = parseTime(validity.children[1]);
        const now = Date.now();

        // SAN
        let sans = [];
        if (exts){
          for (const ext of exts.children[0].children){
            if (oid(ext.children[0].bytes) === '2.5.29.17'){
              const octet = ext.children[ext.children.length - 1];
              const gn = parseTLV(octet.bytes, 0, octet.bytes.length)[0];
              for (const item of gn.children){
                if (item.tag === 2) sans.push('DNS:' + td.decode(item.bytes));
                else if (item.tag === 7) sans.push('IP:' + [...item.bytes].join('.'));
                else if (item.tag === 1) sans.push('email:' + td.decode(item.bytes));
                else if (item.tag === 6) sans.push('URI:' + td.decode(item.bytes));
              }
            }
          }
        }
        // public key
        const keyAlgOid = oid(spki.children[0].children[0].bytes);
        const keyAlgName = OIDS[keyAlgOid] || keyAlgOid;
        let keyDesc = keyAlgName;
        if (keyAlgName === 'RSA'){
          const bitstr = spki.children[1];
          const inner = parseTLV(bitstr.bytes, 1, bitstr.bytes.length)[0]; // skip unused-bits byte
          let mod = inner.children[0].bytes;
          while (mod.length && mod[0] === 0) mod = mod.subarray(1);
          keyDesc = `RSA ${mod.length * 8}-bit`;
        } else if (keyAlgName === 'EC'){
          const curve = spki.children[0].children[1];
          keyDesc = 'EC ' + (curve ? (OIDS[oid(curve.bytes)] || oid(curve.bytes)) : '');
        }
        const serialHex = [...serial.bytes].map(hex2).join(':').replace(/^00:/, '');
        const sigOid = oid(cert.children[1].children[0].bytes);

        const set = (id, v) => $('#x5-'+id).textContent = v || '—';
        set('subject', subjParts.join(', '));
        set('cn', cn ? cn.slice(3) : '—');
        set('san', sans.join('  ') || '— (none)');
        set('issuer', issParts.join(', '));
        set('self', subjParts.join(',') === issParts.join(',') ? 'yes' : 'no');
        set('from', nb.toISOString());
        set('until', na.toISOString());
        const status = now < nb.getTime() ? '⚠ not yet valid'
          : now > na.getTime() ? '✗ EXPIRED'
          : `✓ valid · ${Math.round((na.getTime() - now) / 86400000)} days left`;
        $('#x5-status').innerHTML = `<span style="color:${status[0]==='✓'?'var(--good)':'var(--bad)'}">${status}</span>`;
        set('serial', serialHex);
        set('sig', OIDS[sigOid] || sigOid);
        set('key', keyDesc);
        set('ver', 'v' + ver);
        box.style.display = '';
      } catch (e){ err.textContent = 'Could not parse as an X.509 certificate (' + (e.message || e) + ')'; }
    };
    inp.addEventListener('input', run);
  }
});

/* ── file checksum ─────────────────────────────────────────── */
tool({
  id:'filehash', name:'File checksum', group:'Crypto',
  blurb:'Drop a file to get its MD5, SHA-1, SHA-256 and SHA-512, and verify it against an expected checksum — the “did my download arrive intact” check. The file never leaves the tab.',
  html: `
    <div class="drop" id="fh-drop">Drop a file here or click to choose</div>
    <input type="file" id="fh-file" style="display:none">
    <div class="err" id="fh-err"></div>
    <div class="outs" id="fh-outs" style="display:none;margin-top:.8rem">
      ${outRow('File','fh-name')}
      ${outRow('MD5','fh-md5')}
      ${outRow('SHA-1','fh-sha1')}
      ${outRow('SHA-256','fh-sha256')}
      ${outRow('SHA-512','fh-sha512')}
    </div>
    <label class="lbl">Verify against a checksum</label>
    <div class="row">
      <input class="grow" type="text" id="fh-exp" spellcheck="false" placeholder="paste an expected hash (any algorithm)">
      <span id="fh-vres" style="font-size:.9rem"></span>
    </div>
    ${shPanel('filehash', [
      {why:'sha-256 of a file', cmd:`shasum -a 256 file.iso`},
      {why:'md5 and sha-512', cmd:`md5sum file.iso; shasum -a 512 file.iso`},
      {why:'verify against a published checksum', cmd:`echo 'EXPECTED  file.iso' | shasum -a 256 -c`},
    ])}`,
  wire(){
    const drop = $('#fh-drop'), file = $('#fh-file'), exp = $('#fh-exp'), err = $('#fh-err');
    let hashes = {};
    const hex = buf => [...new Uint8Array(buf)].map(hex2).join('');
    const handle = async f => {
      if (!f) return;
      err.textContent = ''; drop.textContent = `Hashing ${f.name}…`;
      try {
        const buf = await f.arrayBuffer();
        hashes = { md5: md5(new Uint8Array(buf)) };
        $('#fh-name').textContent = `${f.name} · ${f.size.toLocaleString('en-US')} bytes`;
        $('#fh-md5').textContent = hashes.md5;
        $('#fh-outs').style.display = '';
        if (crypto.subtle){
          for (const [id, alg] of [['fh-sha1','SHA-1'],['fh-sha256','SHA-256'],['fh-sha512','SHA-512']]){
            const d = hex(await crypto.subtle.digest(alg, buf));
            hashes[id] = d; $('#'+id).textContent = d;
          }
        } else ['fh-sha1','fh-sha256','fh-sha512'].forEach(id => $('#'+id).textContent = 'WebCrypto unavailable');
        drop.textContent = `${f.name} — drop another to replace`;
        verify();
      } catch { err.textContent = 'Could not read the file'; drop.textContent = 'Drop a file here or click to choose'; }
    };
    const verify = () => {
      const v = exp.value.trim().toLowerCase(), res = $('#fh-vres');
      if (!v || !Object.keys(hashes).length){ res.textContent = ''; return; }
      const all = [hashes.md5, hashes['fh-sha1'], hashes['fh-sha256'], hashes['fh-sha512']].filter(Boolean);
      const match = all.find(h => h.toLowerCase() === v);
      const byLen = { 32:'MD5', 40:'SHA-1', 64:'SHA-256', 128:'SHA-512' };
      res.innerHTML = match ? `<span style="color:var(--good)">✓ matches ${byLen[match.length] || ''}</span>`
                            : '<span style="color:var(--bad)">✗ no match</span>';
    };
    drop.addEventListener('click', () => file.click());
    file.addEventListener('change', () => handle(file.files[0]));
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('over'));
    drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); handle(e.dataTransfer.files[0]); });
    exp.addEventListener('input', verify);
  }
});

tool({
  id:'gradient', name:'CSS gradient', group:'Convert',
  blurb:'Build a linear or radial gradient with as many color stops as you like, preview it live, and copy the CSS.',
  html: `
    <div class="row">
      <div class="seg" id="gr-type"><button class="on" data-t="linear">Linear</button><button data-t="radial">Radial</button></div>
      <label class="check" id="gr-anglewrap">angle <input type="number" id="gr-angle" value="90" min="0" max="360" style="width:5rem">°</label>
      <button class="ghost" id="gr-add">+ Add stop</button>
    </div>
    <div id="gr-stops" style="margin-top:.7rem;display:flex;flex-direction:column;gap:.4rem"></div>
    <div id="gr-preview" style="height:130px;border:1px solid var(--border-2);border-radius:var(--radius);margin-top:.8rem"></div>
    <label class="lbl">CSS ${cpyBtn('#gr-css')}</label>
    <textarea id="gr-css" readonly style="min-height:50px"></textarea>
    ${shPanel('gradient', [{why:'pure CSS — drop it into a stylesheet', cmd:`background: linear-gradient(90deg, #106b5b, #ffb000);`}])}`,
  wire(){
    let type = 'linear';
    let stops = [{ c:'#106b5b', p:0 }, { c:'#ffb000', p:100 }];
    const stopsEl = $('#gr-stops');
    const stopStr = () => stops.slice().sort((a,b) => a.p - b.p).map(s => `${s.c} ${s.p}%`).join(', ');
    const css = () => type === 'linear'
      ? `linear-gradient(${$('#gr-angle').value}deg, ${stopStr()})`
      : `radial-gradient(circle, ${stopStr()})`;
    const update = () => {
      const g = css();
      $('#gr-preview').style.background = g;
      $('#gr-css').value = `background: ${g};`;
      $('#gr-anglewrap').style.display = type === 'linear' ? '' : 'none';
    };
    const render = () => {
      stopsEl.innerHTML = stops.map((s,i) => `
        <div class="row" data-i="${i}">
          <input type="color" value="${s.c}" data-k="c" style="width:48px;height:34px;padding:2px;border:1px solid var(--border-2);border-radius:6px;background:var(--surface)">
          <input type="number" value="${s.p}" min="0" max="100" data-k="p" style="width:5.5rem"> %
          <button class="ghost gr-del" ${stops.length<=2?'disabled':''} style="padding:.3rem .65rem">✕</button>
        </div>`).join('');
      update();
    };
    stopsEl.addEventListener('input', e => {
      const row = e.target.closest('[data-i]'); if (!row) return;
      const i = +row.dataset.i, k = e.target.dataset.k;
      if (k === 'c') stops[i].c = e.target.value;
      if (k === 'p') stops[i].p = Math.max(0, Math.min(100, +e.target.value || 0));
      update();
    });
    stopsEl.addEventListener('click', e => {
      if (e.target.classList.contains('gr-del') && stops.length > 2){
        stops.splice(+e.target.closest('[data-i]').dataset.i, 1); render();
      }
    });
    $('#gr-add').addEventListener('click', () => { stops.push({ c:'#ffffff', p:50 }); render(); });
    $('#gr-angle').addEventListener('input', update);
    $$('#gr-type button').forEach(b => b.addEventListener('click', () => {
      $$('#gr-type button').forEach(x => x.classList.remove('on')); b.classList.add('on'); type = b.dataset.t; update();
    }));
    render();
  }
});

tool({
  id:'ws', name:'Whitespace inspector', group:'Text',
  blurb:'Reveal the invisible gremlins in pasted text — zero-width spaces, non-breaking spaces, smart quotes, tabs and trailing whitespace — then clean them out.',
  html: `

    <label class="lbl">Clean up</label>
    <div class="row">
      <label class="check"><input type="checkbox" id="ws-trail" checked> trim trailing</label>
      <label class="check"><input type="checkbox" id="ws-zw" checked> remove zero-width</label>
      <label class="check"><input type="checkbox" id="ws-nbsp" checked> NBSP → space</label>
      <label class="check"><input type="checkbox" id="ws-quotes"> smart quotes → ASCII</label>
      <label class="check"><input type="checkbox" id="ws-collapse"> collapse spaces</label>
      <label class="check"><input type="checkbox" id="ws-crlf"> normalize to LF</label>
    </div>
    <label class="lbl">Cleaned ${cpyBtn('#ws-out')}</label>
    <textarea id="ws-out" readonly style="min-height:110px"></textarea>
    ${shPanel('ws', [
      {why:'find non-ASCII / invisible bytes', cmd:`grep -nP '[^\\x00-\\x7F]' file.txt`},
      {why:'strip trailing whitespace', cmd:`sed -i 's/[[:space:]]*$//' file.txt`},
      {why:'CRLF → LF', cmd:`sed -i 's/\\r$//' file.txt`},
    ])}`,
  wire(){
    const inp = $('#ws-in');
    const SPECIAL = {
      '\u00A0':'NBSP', '\u200B':'ZWSP', '\u200C':'ZWNJ', '\u200D':'ZWJ', '\uFEFF':'BOM',
      '\u00AD':'SHY', '\u2009':'THIN', '\u202F':'NNBSP',
      '\u2018':'\u2018', '\u2019':'\u2019', '\u201C':'\u201C', '\u201D':'\u201D', '\u2013':'EN', '\u2014':'EM',
    };
    const e = s => s.replace(/[&<>]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[c]));
    const run = () => {
      const v = inp.value;
      const counts = {};
      let html = '';
      for (const ch of v){
        if (ch === '\t'){ html += '<mark style="background:#cde3ff;color:#1d3a5f">→</mark>\t'; continue; }
        if (ch === '\n'){ html += '<span style="color:var(--faint)">¶</span>\n'; continue; }
        const lbl = SPECIAL[ch];
        if (lbl){ counts[lbl] = (counts[lbl] || 0) + 1;
          html += `<mark title="U+${ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0')}">[${lbl}]</mark>`; }
        else html += e(ch);
      }
      html = html.replace(/([ \t]+)(\n|$)/g, '<mark style="background:#ffd0d0;color:#7a1d1d">$1</mark>$2');
      $('#ws-view').innerHTML = html || '<span style="color:var(--faint)">empty</span>';
      const found = Object.entries(counts).map(([k,n]) => `${n}×${k}`).join('   ');
      $('#ws-found').textContent = found || 'no invisible characters found';
      let out = v;
      if ($('#ws-crlf').checked) out = out.replace(/\r\n?/g, '\n');
      if ($('#ws-zw').checked) out = out.replace(/[\u200B\u200C\u200D\uFEFF\u00AD]/g, '');
      if ($('#ws-nbsp').checked) out = out.replace(/[\u00A0\u2009\u202F]/g, ' ');
      if ($('#ws-quotes').checked) out = out.replace(/[\u2018\u2019]/g, "'").replace(/[\u201C\u201D]/g, '"').replace(/\u2014/g, '--').replace(/\u2013/g, '-');
      if ($('#ws-collapse').checked) out = out.replace(/ {2,}/g, ' ');
      if ($('#ws-trail').checked) out = out.replace(/[ \t]+$/gm, '');
      $('#ws-out').value = out;
    };
    inp.addEventListener('input', run);
    ['ws-trail','ws-zw','ws-nbsp','ws-quotes','ws-collapse','ws-crlf'].forEach(id => $('#'+id).addEventListener('change', run));
    run();
  }
});

tool({
  id:'favicon', name:'Favicon generator', group:'Convert',
  blurb:'Drop an image and get every favicon size, a multi-resolution .ico, and the HTML link tags — rendered on a canvas, entirely offline.',
  html: `
    <div class="drop" id="fv-drop">Drop a square image here or click to choose</div>

      <label class="lbl">Sizes <span style="text-transform:none;letter-spacing:0;color:var(--faint)">click a tile to download that PNG</span></label>
      <div id="fv-grid" style="display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-end"></div>
      <div class="row" style="margin-top:.9rem"><button class="act" id="fv-ico">Download favicon.ico</button></div>
      <label class="lbl">HTML ${cpyBtn('#fv-html')}</label>
      <textarea id="fv-html" readonly style="min-height:104px"></textarea>
    </div>
    ${shPanel('favicon', [
      {why:'one size with ImageMagick', cmd:`magick logo.png -resize 32x32 favicon-32.png`},
      {why:'a multi-resolution .ico', cmd:`magick logo.png -define icon:auto-resize=16,32,48 favicon.ico`},
    ])}`,
  wire(){
    const SIZES = [16, 32, 48, 180, 192, 512];
    const drop = $('#fv-drop'), file = $('#fv-file'), err = $('#fv-err');
    let img = null;
    const renderTo = s => { const c = document.createElement('canvas'); c.width = c.height = s; c.getContext('2d').drawImage(img, 0, 0, s, s); return c; };
    const dl = (blob, name) => { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click(); };
    const buildIco = async sizes => {
      const pngs = await Promise.all(sizes.map(s => new Promise(res => renderTo(s).toBlob(b => b.arrayBuffer().then(res), 'image/png'))));
      const n = sizes.length;
      const head = new DataView(new ArrayBuffer(6 + 16 * n));
      head.setUint16(0, 0, true); head.setUint16(2, 1, true); head.setUint16(4, n, true);
      let offset = 6 + 16 * n; const parts = [];
      sizes.forEach((s, i) => {
        const png = new Uint8Array(pngs[i]); const e = 6 + 16 * i;
        head.setUint8(e, s >= 256 ? 0 : s); head.setUint8(e + 1, s >= 256 ? 0 : s);
        head.setUint16(e + 4, 1, true); head.setUint16(e + 6, 32, true);
        head.setUint32(e + 8, png.length, true); head.setUint32(e + 12, offset, true);
        offset += png.length; parts.push(png);
      });
      const out = new Uint8Array(offset); out.set(new Uint8Array(head.buffer), 0);
      let o = 6 + 16 * n; for (const p of parts){ out.set(p, o); o += p.length; }
      return new Blob([out], { type:'image/x-icon' });
    };
    const handle = f => {
      if (!f || !f.type.startsWith('image/')){ err.textContent = 'Please choose an image file'; return; }
      err.textContent = ''; const i = new Image();
      i.onload = () => {
        img = i;
        err.textContent = i.width !== i.height ? 'Tip: a square source gives the best result.' : '';
        $('#fv-out').style.display = '';
        $('#fv-grid').innerHTML = SIZES.map(s => { const d = Math.min(s, 96);
          return `<div style="text-align:center"><canvas data-s="${s}" width="${d}" height="${d}" style="border:1px solid var(--border);border-radius:6px;cursor:pointer;background:var(--surface)"></canvas><div style="font-size:.7rem;color:var(--faint);margin-top:.25rem">${s}px</div></div>`;
        }).join('');
        SIZES.forEach(s => { const cv = $(`#fv-grid canvas[data-s="${s}"]`); const d = Math.min(s, 96);
          cv.getContext('2d').drawImage(img, 0, 0, d, d); cv.title = `download ${s}×${s}`;
          cv.addEventListener('click', () => renderTo(s).toBlob(b => dl(b, `favicon-${s}.png`), 'image/png')); });
        $('#fv-html').value = [
          '<link rel="icon" href="/favicon.ico" sizes="any">',
          '<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">',
          '<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">',
          '<link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">',
        ].join('\n');
        drop.textContent = `${f.name} — drop another to replace`;
      };
      i.src = URL.createObjectURL(f);
    };
    drop.addEventListener('click', () => file.click());
    file.addEventListener('change', () => handle(file.files[0]));
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('over'));
    drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); handle(e.dataTransfer.files[0]); });
    $('#fv-ico').addEventListener('click', async () => { if (img) dl(await buildIco([16, 32, 48]), 'favicon.ico'); });
  }
});

    <input type="text" id="aa-customramp" spellcheck="false" placeholder=" .:-=+*#%@">
    <div id="aa-textpane"><label class="lbl">Text</label><input type="text" id="aa-text" spellcheck="false" value="powertoy"></div>
    <div id="aa-imgpane" hidden>
      <div class="drop" id="aa-drop">Drop an image here or click to choose</div>
      <input type="file" id="aa-file" accept="image/*" style="display:none">
    </div>
    <label class="lbl">Output ${cpyBtn('#aa-out')}</label>
    <textarea id="aa-out" readonly style="min-height:230px;font-size:.62rem;line-height:1;white-space:pre;overflow:auto;font-family:var(--mono)"></textarea>
    <div id="aa-preview" hidden style="margin-top:.5rem;background:#0d0d0d;border:1px solid var(--border);border-radius:8px;padding:.6rem;font-family:var(--mono);font-size:.62rem;line-height:1;white-space:pre;overflow:auto"></div>
    ${shPanel('asciiart', [
      {why:'image → ASCII (jp2a)', cmd:`jp2a --width=80 photo.jpg`},
      {why:'or resize + map with ImageMagick', cmd:`magick photo.jpg -resize 80x txt:- | head`},
      {why:'text banners (figlet)', cmd:`figlet -w 120 'powertoy'`},
    ])}`,
  wire(){
    const RAMPS = { standard:' .:-=+*#%@', detailed:" .'`^\",:;Il!i~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$", blocks:' ░▒▓█' };
    const FONTS = { sans:'"Avenir Next", Arial, sans-serif', serif:'Georgia, "Times New Roman", serif',
      mono:'"SF Mono", Menlo, monospace', condensed:'"Arial Narrow", Impact, sans-serif',
      script:'"Snell Roundhand", "Brush Script MT", cursive', slab:'Rockwell, "Courier New", serif' };
    let mode = 'text', img = null;
    const out = $('#aa-out'), preview = $('#aa-preview');
    const ramp = () => { const cr = $('#aa-customramp').value; return cr.length >= 2 ? cr : (RAMPS[$('#aa-ramp').value] || RAMPS.standard); };
    const asciiFromCanvas = src => {
      const cols = Math.min(220, Math.max(10, +$('#aa-cols').value || 80));
      const r = ramp(), invert = $('#aa-invert').checked, color = $('#aa-color').checked;
      const rows = Math.max(1, Math.round(cols * (src.height / src.width) * 0.5));
      const c = document.createElement('canvas'); c.width = cols; c.height = rows;
      const cx = c.getContext('2d'); cx.drawImage(src, 0, 0, cols, rows);
      const d = cx.getImageData(0, 0, cols, rows).data;
      let text = '', html = '';
      for (let y = 0; y < rows; y++){
        let lt = '', lh = '';
        for (let x = 0; x < cols; x++){
          const i = (y*cols + x) * 4, a = d[i+3] / 255;
          let lum = (0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2]) * a + 255 * (1 - a); // composite on white
          let t = lum / 255; if (invert) t = 1 - t;
          const ch = r[Math.min(r.length-1, Math.max(0, Math.round((1 - t) * (r.length - 1))))];
          lt += ch;
          if (color) lh += ch === ' ' ? ' ' : `<span style="color:rgb(${d[i]},${d[i+1]},${d[i+2]})">${esc(ch)}</span>`;
        }
        text += lt.replace(/\s+$/, '') + '\n';
        if (color) html += lh + '\n';
      }
      return { text, html };
    };
    const textCanvas = text => {
      const fs = 64, pad = 10;

});
