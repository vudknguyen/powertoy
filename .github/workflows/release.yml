name: release-and-deploy

# The git tag is the single source of truth for the version.
# Flow: dev branch → PR → merge to main → push a tag `vX.Y.Z`.
# The tag triggers this: it stamps the version from the tag, deploys the site to
# GitHub Pages, and publishes the macOS app + extension to a GitHub Release.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release
  pages: write      # deploy to Pages
  id-token: write   # Pages deployment auth

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # Resolve the version from the tag (e.g. v1.2.0 → 1.2.0) and sanity-check the format.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "$VER" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::tag '$GITHUB_REF_NAME' is not vX.Y.Z"; exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"

  # Stamp the version into the site and deploy to GitHub Pages.
  deploy-pages:
    needs: version
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp version + stage the site
        env:
          VER: ${{ needs.version.outputs.version }}
        run: |
          perl -i -pe "s/const APP_VERSION = '[^']*'/const APP_VERSION = '$VER'/" index.html
          mkdir site
          cp index.html manifest.webmanifest sw.js CNAME \
             icon-192.png icon-512.png icon-maskable-512.png .nojekyll site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4

  # Build the native macOS app + the extension zip, attach both to the Release.
  release:
    needs: version
    runs-on: macos-latest
    env:
      VER: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version into the app
        run: perl -i -pe "s/const APP_VERSION = '[^']*'/const APP_VERSION = '$VER'/" index.html

      - name: Build native .app + zip
        run: |
          POWERTOY_VERSION="$VER" ./native/build-macos.sh
          cd native/build && zip -r -y -X ../../powertoy-macos.zip powertoy.app

      - name: Package the Chrome extension
        run: |
          cp index.html manifest.webmanifest icon-192.png icon-512.png icon-maskable-512.png extension/
          perl -i -pe "s/\"version\":\s*\"[0-9.]+\"/\"version\": \"$VER\"/" extension/manifest.json
          cd extension && zip -r -X ../powertoy-extension.zip . -x '*.DS_Store'

      - name: Publish release with both artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: powertoy ${{ github.ref_name }}
          files: |
            powertoy-macos.zip
            powertoy-extension.zip
          generate_release_notes: true
