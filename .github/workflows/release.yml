name: release-and-deploy

# The git tag is the single source of truth for the version.
# Flow: dev branch → PR → merge to main → push a tag `vX.Y.Z`.
# The tag triggers this: it stamps the version from the tag, deploys the site to
# GitHub Pages, and publishes the macOS app + extension to a GitHub Release.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release
  pages: write      # deploy to Pages
  id-token: write   # Pages deployment auth

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # Resolve the version from the tag (e.g. v1.2.0 → 1.2.0) and sanity-check the format.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "$VER" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::tag '$GITHUB_REF_NAME' is not vX.Y.Z"; exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"

  # Stamp the version into the site and deploy to GitHub Pages.
  deploy-pages:
    needs: version
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - name: Stamp version + stage the site
        env:
          VER: ${{ needs.version.outputs.version }}
        run: |
          perl -i -pe "s/const APP_VERSION = '[^']*'/const APP_VERSION = '$VER'/" index.html
          mkdir site
          cp index.html manifest.webmanifest sw.js CNAME \
             icon-192.png icon-512.png icon-maskable-512.png .nojekyll site/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v5

  # Build the native macOS app + the extension zip, attach both to the Release.
  release:
    needs: version
    runs-on: macos-latest
    env:
      VER: ${{ needs.version.outputs.version }}
      # exposed at job level so the `if:` guards below can detect whether signing is configured
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
    steps:
      - uses: actions/checkout@v5

      - name: Stamp version into the app
        run: perl -i -pe "s/const APP_VERSION = '[^']*'/const APP_VERSION = '$VER'/" index.html

      # Import the Developer ID Application cert into a throwaway keychain. Skipped (and the
      # build falls back to ad-hoc) when the signing secrets aren't configured — e.g. forks.
      - name: Import signing certificate
        if: env.MACOS_CERT_P12_BASE64 != ''
        env:
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F\" '/Developer ID Application/{print $2; exit}')"
          if [ -z "$IDENTITY" ]; then echo "::error::no 'Developer ID Application' identity in the imported certificate"; exit 1; fi
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build native .app
        run: POWERTOY_VERSION="$VER" ./native/build-macos.sh   # uses $SIGN_IDENTITY if the step above set it

      # Notarize with Apple and staple the ticket, so a downloaded app launches without warnings.
      - name: Notarize + staple
        if: env.MACOS_CERT_P12_BASE64 != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent native/build/powertoy.app "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple native/build/powertoy.app
          spctl -a -vvv -t exec native/build/powertoy.app || true

      - name: Zip the macOS app
        run: cd native/build && zip -r -y -X ../../powertoy-macos.zip powertoy.app

      - name: Package the Chrome extension
        run: |
          cp index.html manifest.webmanifest icon-192.png icon-512.png icon-maskable-512.png extension/
          perl -i -pe "s/\"version\":\s*\"[0-9.]+\"/\"version\": \"$VER\"/" extension/manifest.json
          cd extension && zip -r -X ../powertoy-extension.zip . -x '*.DS_Store'

      - name: Publish release with both artifacts
        uses: softprops/action-gh-release@v3
        with:
          name: powertoy ${{ github.ref_name }}
          files: |
            powertoy-macos.zip
            powertoy-extension.zip
          generate_release_notes: true
